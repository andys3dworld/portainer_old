version: "2"
services:
  adguardhome:
    image: adguard/adguardhome
    container_name: adguardhome
    ports:
      - 192.168.0.253:53:53/tcp
      - 192.168.0.253:53:53/udp
      - 192.168.0.253:784:784/udp
      - 192.168.0.253:853:853/tcp
      - 192.168.0.253:3000:3000/tcp
      - 192.168.0.253:80:80/tcp
      - 192.168.0.253:443:443/tcp
    volumes:
      - ./workdir:/opt/adguardhome/work
      - ./confdir:/opt/adguardhome/conf
    restart: unless-stopped
    networks:
      default:
        ipv4_address: 192.168.0.253

networks:
  default:
    external:
      name: adguard
